name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm OIDC trusted publishing (+ provenance); no token needed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag '$GITHUB_REF_NAME' (=$TAG) does not match package.json version '$PKG'"
            exit 1
          fi
      - name: Type-check
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      # OIDC trusted publishing requires npm >= 11.5.1 (newer than the bundled npm).
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest
      # No NODE_AUTH_TOKEN: with id-token:write + a trusted publisher configured on
      # npmjs.com (repo Octen-Team/octen-cli, workflow release.yml), npm authenticates
      # via OIDC and attaches provenance automatically. `npm publish` runs prepublishOnly (build).
      - name: Publish to npm (OIDC)
        run: npm publish --access public
