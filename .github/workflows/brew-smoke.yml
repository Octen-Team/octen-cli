name: Brew smoke

on:
  workflow_dispatch: {}

jobs:
  brew:
    runs-on: macos-14
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      # Skip the interactive third-party-tap trust prompt (Homebrew 6+).
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - name: Install via the single fully-qualified command (auto-taps; no separate brew tap)
        run: brew install Octen-Team/tap/octen
      - name: Verify the installed binary
        run: |
          which octen
          octen --version
          octen completion zsh | head -1
      - name: Uninstall round-trip
        run: |
          brew uninstall octen
          brew untap Octen-Team/tap
          if brew list octen >/dev/null 2>&1; then echo "ERROR: still installed"; exit 1; fi
          echo "uninstalled cleanly"
